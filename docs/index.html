<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ytmp3 - clean youtube audio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <h1>ytmp3</h1>
    <p class="tagline">Paste a YouTube link, get the audio. No ads, no junk.</p>

    <form id="form" novalidate>
      <input
        id="url"
        type="url"
        inputmode="url"
        autocomplete="off"
        placeholder="https://youtube.com/watch?v=..."
        aria-label="YouTube URL"
        required
      />
      <button id="submit" type="submit">Get MP3</button>
    </form>

    <p id="status" class="status" role="status" aria-live="polite"></p>
  </main>

  <footer>
    <span>Audio you have the rights to only. Respect creators.</span>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
