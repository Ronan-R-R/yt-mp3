name: Release

on:
  push:
    tags: ["v*"]
  schedule:
    # Weekly rebuild so the bundled yt-dlp stays current with YouTube changes.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pyinstaller
      - run: python build.py
      - run: Rename-Item dist/ytmp3.exe ytmp3-windows.exe
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: ytmp3-windows
          path: dist/ytmp3-windows.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y python3-tk
      - run: pip install -r requirements.txt pyinstaller
      - run: python build.py
      - run: mv dist/ytmp3 dist/ytmp3-linux
      - uses: actions/upload-artifact@v4
        with:
          name: ytmp3-linux
          path: dist/ytmp3-linux

  android:
    runs-on: ubuntu-latest
    # Android/buildozer builds are brittle; never let it block the desktop release.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev \
            build-essential ccache libltdl-dev
      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip
          pip install "buildozer==1.5.0" "cython==0.29.36"
      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            android/.buildozer
          key: buildozer-${{ hashFiles('android/buildozer.spec') }}
      - name: Build APK
        working-directory: android
        run: buildozer android debug
      - name: Rename APK
        run: cp "$(find android/bin -name '*.apk' | head -1)" ytmp3-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: ytmp3-android
          path: ytmp3-android.apk

  release:
    needs: [windows, linux, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - id: meta
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=build-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ytmp3 ${{ steps.meta.outputs.tag }}
          files: artifacts/*
          make_latest: true
